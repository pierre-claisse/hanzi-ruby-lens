# Build and deploy the PWA to GitHub Pages on every push to `main`.
# Phase 1 stub: no secrets encryption yet — that comes in Phase 4.
name: Deploy PWA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Encrypt sync secrets into public/sync_blobs.json
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          SYNC_GIST_ID: ${{ secrets.SYNC_GIST_ID }}
          SYNC_COMMON_PASSWORD: ${{ secrets.SYNC_COMMON_PASSWORD }}
          SYNC_PIERRE_PASSWORD: ${{ secrets.SYNC_PIERRE_PASSWORD }}
        run: node scripts/build-secrets.mjs

      - name: Vite build
        env:
          # Vite needs the base path so static assets resolve under
          # https://pierre-claisse.github.io/hanzi-ruby-lens/
          VITE_BASE: /hanzi-ruby-lens/
        run: npm run build:web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
