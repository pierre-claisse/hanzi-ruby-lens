<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7E1F4F" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Hanzi Ruby Lens</title>
    <script>
      // Apply theme + palette synchronously before React boots so the
      // LoginScreen renders in the user's chosen colours immediately,
      // with no flash of default styling.
      //   theme         "dark" | "light"   (set by useTheme on toggle)
      //   colorPalette  palette id          (set by useColorPalette)
      // Theme falls back to OS preference when no explicit choice is stored.
      (function() {
        try {
          var stored = localStorage.getItem("theme");
          var isDark = stored === "dark"
            || (stored !== "light"
                && window.matchMedia
                && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) { /* private browsing / quota — fall through */ }
        try {
          var palette = localStorage.getItem("colorPalette");
          if (palette) document.documentElement.dataset.palette = palette;
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
